<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Formulários</title>
</head>
<body>
    <div class="container">
        <form class="form" action="" method="post">
<label for="nome">Nome</label>
<input type="text" name="nome" id="nome">

<label for="data_nasc">Data de Nascimento</label>
<input type="date" name="data_nasc" id="data_nasc">

<label for="genero">Gênero</label>

<div class="radio">
<label for="feminino">Feminino</label>
<input type="radio" name="feminino" id="feminino">

<label for="masculino">Masculino</label>
<input type="radio" name="masculino" id="masculino">
</div>

<label for="estado_civil">Estado Civil</label>
<select name="estado_civil" id="estado_civil">
<option value="solteiro">Solteiro</option>
<option value="casado">Casado</option>
<option value="divorciado">Divorciado</option>
<option value="uniao_estavel">União Estável</option>
</select>

<label for="linguagem_programacao">Selecione as linguagens que você domina</label>

<div class="linguagem">
<input type="checkbox" name="php" id="php"><label for="php">PHP</label>
<input type="checkbox" name="c#" id="c#"><label for="c#">C#</label>
<input type="checkbox" name="python" id="python"><label for="python">Python</label>
</div>

<label for="email">Email</label>
<input type="email" name="email" id="email">
<label for="password">Senha</label> 
<input type="password" nome="senha" id="senha">

<label for="descricao">Descreva suas habilidades</label>
<textarea name="descricao" id="descricao" cols="30" rows="10"></textarea>

<button type="submit">Cadastrar</button>
<p>Caso você já tenha um cadastro <a href="login.html">Clique aqui</a> </p>


        </form>
    </div>

</body>
</html>
